spring.application.name=demo
server.port=${SERVER_PORT}
server.servlet.context-path=/${SERVICE_BASE_URL:payment}

# Endpoint para health check
management.endpoints.web.exposure.include=health

# Base de datos
spring.datasource.url=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#cors y configuraciones del backend
app.frontendHost=${FRONTEND_ORIGIN}
backend.host=${BACKEND_ORIGIN}

spring.mvc.contentnegotiation.default-content-type=application/json
spring.mvc.converters.preferred-json-mapper=jackson

#JWT
jwt.secret=${JWT_SECRET}
jwt.refresh-secret=${JWT_REFRESH_SECRET}
jwt.expires-in=20h
jwt.refresh-expires-in=20h

#SWAGGER
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json
#springdoc.api-docs.path=/api/hh/v3/api-docs
#springdoc.swagger-ui.config-url=/api/hh/v3/api-docs/swagger-config
#springdoc.swagger-ui.path=/api/hh/swagger-ui.html
#springdoc.swagger-ui.url=/api/hh/v3/api-docs

#Correos electronicos
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.protocol=smtp
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Archivos
file.upload-dir=./uploads/files
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

#aws
aws.s3.bucket-name=${BUCKET_NAME}
aws.region=${AWS_REGION}
aws.accessKey=${AWS_ACCESS_KEY}
aws.secretKey=${AWS_SECRET}

#azure
#spring.cloud.azure.storage.blob.account-name=${STORAGE_ACCOUNT}
#spring.cloud.azure.storage.blob.endpoint=${STORAGE_ACCOUNT_ENDPOINT}
#spring.cloud.azure.storage.blob.account-key=${STORAGE_ACCESS_KEY}
#app.storage.container=${STORAGE_CONTAINER}
#app.storage.region=${STORAGE_REGION}

#microservices
app.microservice.url=${MICROSERVICE_URL}
